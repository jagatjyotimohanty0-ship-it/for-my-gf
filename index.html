<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Story ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

background:linear-gradient(
135deg,
#ff9ecf,
#ffc5e6,
#b6d7ff,
#89b4ff
);

background-size:400% 400%;

animation:bgMove 12s ease infinite;

color:white;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.book{

position:relative;

width:90%;
max-width:900px;

height:90vh;

border-radius:30px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.25);

box-shadow:
0 20px 50px rgba(0,0,0,.25);

overflow:hidden;

}

.page{

position:absolute;

inset:0;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

padding:50px;

text-align:center;

}

h1{

font-size:3rem;

margin-bottom:20px;

text-shadow:0 0 20px rgba(255,255,255,.5);

}

p{

font-size:1.15rem;

line-height:1.9;

max-width:700px;

}

button{

margin-top:40px;

padding:15px 40px;

border:none;

border-radius:50px;

font-size:18px;

cursor:pointer;

background:white;

color:#ff4f95;

font-weight:700;

transition:.35s;

}

button:hover{

transform:translateY(-4px) scale(1.05);

box-shadow:
0 0 25px white,
0 0 40px #ff89bf;

}

@media(max-width:768px){

.book{

width:95%;
height:95vh;

}

.page{

padding:30px;

}

h1{

font-size:2rem;

}

p{

font-size:1rem;

}

button{

width:100%;

}

}
/* Floating Hearts */

.heart{
position:absolute;
bottom:-60px;
font-size:22px;
opacity:.8;
animation:floatHeart linear infinite;
pointer-events:none;
}

@keyframes floatHeart{

0%{
transform:translateY(0) scale(.7);
opacity:0;
}

15%{
opacity:1;
}

100%{
transform:translateY(-120vh) rotate(360deg) scale(1.4);
opacity:0;
}

/* Typing Cursor */

}

.typing::after{
content:"|";
animation:blink .7s infinite;
}

@keyframes blink{

50%{
opacity:0;
}

}

/* Fade Animation */

.fade{
animation:fadeIn 1.2s;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}
/* Glow */

.glow{
position:absolute;
width:250px;
height:250px;
border-radius:50%;
filter:blur(80px);
opacity:.35;
z-index:-1;
animation:moveGlow 10s ease-in-out infinite alternate;
}

.glow1{
background:#ff6fb3;
top:-60px;
left:-60px;
}

.glow2{
background:#7db8ff;
bottom:-60px;
right:-60px;
animation-delay:2s;
}

@keyframes moveGlow{

from{
transform:translate(0,0) scale(1);
}

to{
transform:translate(40px,-40px) scale(1.3);
}

}

/* Stars */

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 2s infinite;
opacity:.8;
}

@keyframes twinkle{

0%,100%{
opacity:.2;
transform:scale(.8);
}

50%{
opacity:1;
transform:scale(1.3);
}

}
.page{

position:absolute;

inset:0;

display:none;

flex-direction:column;

justify-content:center;

align-items:center;

padding:50px;

text-align:center;

opacity:0;

transition:.7s;

}

.page.active{

display:flex;

opacity:1;

animation:fadeIn .8s;

}
.envelope{

font-size:100px;
cursor:pointer;
transition:.4s;

}

.envelope:hover{

transform:scale(1.1);

}

.letter{

display:none;

margin-top:30px;

background:rgba(255,255,255,.15);

padding:30px;

border-radius:20px;

max-width:700px;

backdrop-filter:blur(10px);

}

.letter.show{

display:block;

animation:fadeIn .8s;

}
</style>

</head>

<body>
<div class="glow glow1"></div>
<div class="glow glow2"></div>
<div class="book">

<!-- PAGE 1 -->

<section class="page fade active" id="page1">

<h1 class="typing" id="typing"></h1>

<p id="introText"></p>

<button id="next1">

✨ Start Our Story ✨

</button>

</section>

<!-- PAGE 2 -->
<!-- PAGE 3 -->

<section class="page" id="page3">

<h1>💌 Letter</h1>

<div class="envelope" id="envelope">

💌

</div>

<div class="letter" id="letter">

<p id="letterText"></p>

<button id="closeLetter">

Close Letter ❤️

</button>

</div>

</section>
<section class="page" id="page2">

<h1>❤️ 14 May 2026 ❤️</h1>

<p>

Kuch dates sirf calendar me nahi hoti...

<br><br>

Dil me hamesha ke liye bas jaati hain.

<br><br>

14 May 2026...

<br><br>

Hamari life ki wahi date hai.

<br><br>

Us din se...

<br><br>

"Main"

<br><br>

Aur

<br><br>

"Tum"

<br><br>

Dheere Dheere...

<br><br>

"HUM"

<br><br>

Ban gaye. ❤️

</p>

<button id="next2">

Continue ❤️

</button>

</section>
<script>
const introLines=[

"Agar tum yaha tak aa gayi ho... ❤️",

"",

"To shayad tum samajh hi gayi hogi...",

"",

"Ye koi normal website nahi hai...",

"",

"Ye meri feelings hain...",

"",

"Jo words me bolna mushkil tha...",

"",

"Isliye maine unhe is website me likh diya. ❤️",

"",

"Ready ho?",

"",

"Chalo...",

"",

"Hamari story dobara jeete hain. ❤️"

];
const text="Hey Noor... ❤️";

let i=0;

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(type,100);

}

}

type();
let line=0;

function showLines(){

if(line<introLines.length){

document.getElementById("introText").innerHTML+=introLines[line]+"<br>";

line++;

setTimeout(showLines,700);

}

}

setTimeout(showLines,900);
function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=Math.random()>0.5?"❤️":"💖";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(5+Math.random()*6)+"s";

heart.style.fontSize=(18+Math.random()*18)+"px";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},11000);

}

setInterval(createHeart,350);
document.getElementById("startBtn").onclick=function(){

this.innerHTML="❤️ Loading Story... ❤️";

this.style.transform="scale(.95)";

};
  for(let i=0;i<50;i++){

const star=document.createElement("div");

star.className="star";

star.style.width=(2+Math.random()*3)+"px";
star.style.height=star.style.width;

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

star.style.animationDelay=Math.random()*3+"s";

document.body.appendChild(star);

}
function showPage(id){

document.querySelectorAll(".page").forEach(page=>{

page.classList.remove("active");

});

document.getElementById(id).classList.add("active");

}

document.getElementById("next1").onclick=function(){

showPage("page2");

};

document.getElementById("next2").onclick=function(){

alert("Page 3 agle part me banega ❤️");

};
document.getElementById("next2").onclick=function(){

showPage("page3");

};

const letterMessage=`Dear Noor ❤️

Pata hai...

Kabhi kabhi main sochta hu...

Ki meri life me tumhara aana kitna unexpected tha.

Aur shayad wahi is story ki sabse khoobsurat baat hai.

Tumhare aane ke baad...

Choti choti cheezein bhi special lagne lagi.

I Love You Noor ❤️

Forever Yours,

Jagat ❤️`;

document.getElementById("envelope").onclick=function(){

document.getElementById("letter").classList.add("show");

let i=0;

document.getElementById("letterText").innerHTML="";

const timer=setInterval(()=>{

document.getElementById("letterText").innerHTML+=letterMessage.charAt(i);

i++;

if(i>=letterMessage.length){

clearInterval(timer);

}

},35);

};

document.getElementById("closeLetter").onclick=function(){

alert("Page 4 agle part me ❤️");

};
</script>
</body>
</html>
