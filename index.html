<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Story ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

background:linear-gradient(
135deg,
#ff9ecf,
#ffc5e6,
#b6d7ff,
#89b4ff
);

background-size:400% 400%;

animation:bgMove 12s ease infinite;

color:white;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.book{

position:relative;

width:90%;
max-width:900px;

height:90vh;

border-radius:30px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.25);

box-shadow:
0 20px 50px rgba(0,0,0,.25);

overflow:hidden;

}

.page{

position:absolute;

inset:0;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

padding:50px;

text-align:center;

}

h1{

font-size:3rem;

margin-bottom:20px;

text-shadow:0 0 20px rgba(255,255,255,.5);

}

p{

font-size:1.15rem;

line-height:1.9;

max-width:700px;

}

button{

margin-top:40px;

padding:15px 40px;

border:none;

border-radius:50px;

font-size:18px;

cursor:pointer;

background:white;

color:#ff4f95;

font-weight:700;

transition:.35s;

}

button:hover{

transform:translateY(-4px) scale(1.05);

box-shadow:
0 0 25px white,
0 0 40px #ff89bf;

}

@media(max-width:768px){

.book{

width:95%;
height:95vh;

}

.page{

padding:30px;

}

h1{

font-size:2rem;

}

p{

font-size:1rem;

}

button{

width:100%;

}

}

</style>

</head>

<body>

<div class="book">

<div class="page">

<h1>Loading Our Story ❤️</h1>

<p>

Please wait...

Our beautiful memories are getting ready...

</p>

<button>

Loading...

</button>

</div>

</div>

</body>
</html>
