<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Story ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

background:linear-gradient(
135deg,
#ff9ecf,
#ffc5e6,
#b6d7ff,
#89b4ff
);

background-size:400% 400%;

animation:bgMove 12s ease infinite;

color:white;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.book{

position:relative;

width:90%;
max-width:900px;

height:90vh;

border-radius:30px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.25);

box-shadow:
0 20px 50px rgba(0,0,0,.25);

overflow:hidden;

}

.page{

position:absolute;

inset:0;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

padding:50px;

text-align:center;

}

h1{

font-size:3rem;

margin-bottom:20px;

text-shadow:0 0 20px rgba(255,255,255,.5);

}

p{

font-size:1.15rem;

line-height:1.9;

max-width:700px;

}

button{

margin-top:40px;

padding:15px 40px;

border:none;

border-radius:50px;

font-size:18px;

cursor:pointer;

background:white;

color:#ff4f95;

font-weight:700;

transition:.35s;

}

button:hover{

transform:translateY(-4px) scale(1.05);

box-shadow:
0 0 25px white,
0 0 40px #ff89bf;

}

@media(max-width:768px){

.book{

width:95%;
height:95vh;

}

.page{

padding:30px;

}

h1{

font-size:2rem;

}

p{

font-size:1rem;

}

button{

width:100%;

}

}
/* Floating Hearts */

.heart{
position:absolute;
bottom:-60px;
font-size:22px;
opacity:.8;
animation:floatHeart linear infinite;
pointer-events:none;
}

@keyframes floatHeart{

0%{
transform:translateY(0) scale(.7);
opacity:0;
}

15%{
opacity:1;
}

100%{
transform:translateY(-120vh) rotate(360deg) scale(1.4);
opacity:0;
}

/* Typing Cursor */

}

.typing::after{
content:"|";
animation:blink .7s infinite;
}

@keyframes blink{

50%{
opacity:0;
}

}

/* Fade Animation */

.fade{
animation:fadeIn 1.2s;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}
</style>

</head>

<body>

<div class="book">

<div class="page fade">

<h1 class="typing" id="typing"></h1>

<p>

Agar tum yaha tak aa gayi ho... ❤️

<br><br>

To shayad tum samajh hi gayi hogi...

<br><br>

Ye koi normal website nahi hai...

<br><br>

Ye meri feelings hain...

<br><br>

Jo words me bolna mushkil tha...

<br><br>

Isliye maine unhe is website me likh diya. ❤️

<br><br>

Ready ho?

<br><br>

Chalo...

Hamari story dobara jeete hain.

</p>

<button id="startBtn">

✨ Start Our Story ✨

</button>

</div>
<script>

const text="Hey Noor... ❤️";

let i=0;

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(type,100);

}

}

type();

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=Math.random()>0.5?"❤️":"💖";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(5+Math.random()*6)+"s";

heart.style.fontSize=(18+Math.random()*18)+"px";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},11000);

}

setInterval(createHeart,350);

</script>
</body>
</html>
